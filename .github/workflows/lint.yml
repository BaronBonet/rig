name: lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: ./scripts/dependencies/install.sh

      - name: Generate code
        run: ./scripts/generate/go.sh

      - name: Run linters
        run: ./scripts/ci/lint-go.sh

      - name: Run regression check
        run: sh ./scripts/generate/go_test.sh

      - name: Run tests
        run: go test ./...

      - name: Run workflow assertions
        run: sh ./scripts/ci/github_actions_test.sh
