log-level: warn
filename: "mock_{{ snakecase .InterfaceName }}.go"
mockname: "Mock{{.InterfaceName}}"
inpackage: true
resolve-type-alias: false
disable-version-string: true
issue-845-fix: true
with-expecter: true
all: false
recursive: false
dir: "{{ .InterfaceDirRelative }}"
packages:
  agent/internal/core:
    interfaces:
      TaskRepository:
      RepoConfigLoader:
      WorkspaceSeeder:
      SetupScriptRunner:
      RepoClient:
      SessionClient:
      RuntimeMonitor:
      ProviderClient:
      PRStatusChecker:
  agent/internal/adapters/handler/cli:
    interfaces:
      TaskService:
  agent/internal/pkg/execx:
    interfaces:
      Runner:
  agent/internal/adapters/client/tmux:
    interfaces:
      controlPipe:
      controlPipeFactory:
